name: ci

on: [push, pull_request]

jobs:
  build-images:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # Images with large external downloads first (fail fast)
          - image: testing/hive3.1-hive
            platform: linux/amd64
            runner: ubuntu-24.04
            test: hive3.1-hive
          - image: testing/hive3.1-hive
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: hive3.1-hive
          - image: testing/hive3.1
            platform: linux/amd64
            runner: ubuntu-24.04
            test: hive3.1
          - image: testing/hive3.1
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: hive3.1
          - image: testing/hive3.1-kerberos
            platform: linux/amd64
            runner: ubuntu-24.04
            test: hive3.1-kerberos
            test_images: testing/kdc
          - image: testing/hive3.1-kerberos
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: hive3.1-kerberos
            test_images: testing/kdc

          - image: testing/hive4.0-hive
            platform: linux/amd64
            runner: ubuntu-24.04
            test: hive4.0-hive
          - image: testing/hive4.0-hive
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: hive4.0-hive

          - image: testing/hdp3.1-hive-kerberized
            runner: ubuntu-24.04
            test: hdp3.1-hive

          - image: testing/spark4-iceberg
            platform: linux/amd64
            runner: ubuntu-24.04
            test: spark4-iceberg
          - image: testing/spark4-iceberg
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: spark4-iceberg

          - image: testing/spark4-delta
            platform: linux/amd64
            runner: ubuntu-24.04
            test: spark4-delta
          - image: testing/spark4-delta
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: spark4-delta

          - image: testing/spark3-hudi
            platform: linux/amd64
            runner: ubuntu-24.04
            test: spark3-hudi
          - image: testing/spark3-hudi
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: spark3-hudi

          # Images without external downloads
          - image: testing/kerberos
            platform: linux/amd64
            runner: ubuntu-24.04
            test: kerberos
          - image: testing/kerberos
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: kerberos
          - image: testing/kdc
            platform: linux/amd64
            runner: ubuntu-24.04
            test: kdc
          - image: testing/kdc
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: kdc

          - image: testing/almalinux9-oj17
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: testing/almalinux9-oj17
            platform: linux/arm64
            runner: ubuntu-24.04-arm

          - image: testing/almalinux9-oj17-openldap-referrals
            platform: linux/amd64
            runner: ubuntu-24.04
            test: openldap
          - image: testing/almalinux9-oj17-openldap-referrals
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: openldap

          - image: testing/almalinux9-oj17-openldap-active-directory
            platform: linux/amd64
            runner: ubuntu-24.04
            test: openldap-active-directory
          - image: testing/almalinux9-oj17-openldap-active-directory
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            test: openldap-active-directory

          - image: build/sphinx
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: build/sphinx
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0 # checkout tags so version in Manifest is set properly
    - name: Build ${{ matrix.image }} (${{ matrix.platform }})
      env:
        PLATFORM: ${{ matrix.platform }}
      run: make "${{ matrix.image }}"
    - name: Build test dependencies
      env:
        PLATFORM: ${{ matrix.platform }}
      if: ${{ matrix.test_images != '' }}
      run: |
        for image in ${{ matrix.test_images }}; do
          make "$image"
        done
    - name: Test ${{ matrix.test }}
      env:
        PLATFORM: ${{ matrix.platform }}
      if: ${{ matrix.test  != '' }}
      shell: 'script -q -e -c "bash {0}"'
      run: make test IMAGE_TO_TEST="${{ matrix.test }}"
